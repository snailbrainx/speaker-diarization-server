services:
  speaker-diarization:
    build: .
    container_name: speaker-diarization-app
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      # Without this, CUDA enumerates by FASTEST_FIRST and CUDA_VISIBLE_DEVICES
      # indices stop matching nvidia-smi (e.g. index 0 would pick the 5090 even
      # if you meant the 3090). PCI_BUS_ID keeps the two in sync.
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - DATABASE_URL=sqlite:////app/volumes/speakers.db
      - HF_TOKEN=${HF_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - SPEAKER_THRESHOLD=${SPEAKER_THRESHOLD:-0.30}
      - CONTEXT_PADDING=${CONTEXT_PADDING:-0.15}
      - SILENCE_DURATION=${SILENCE_DURATION:-0.5}
      - FILTER_HALLUCINATIONS=${FILTER_HALLUCINATIONS:-true}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-en}
      - OFFLINE_MODE=${OFFLINE_MODE:-false}
    ports:
      - "8418:8418"
    volumes:
      # SSL certificates for HTTPS/WSS
      - ./certs:/app/certs:ro
      # Persistent storage for speaker database and embeddings
      - ./volumes:/app/volumes
      # Audio recordings and temp files
      - ./data:/app/data
      # Backup snapshots
      - ./backups:/app/backups
      # Shared HuggingFace model cache — pyannote + faster-whisper both read
      # from HF_HOME (set in the Dockerfile to /root/.cache/huggingface).
      - ./volumes/huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

# Development convenience: docker-compose.override.yml bind-mounts ./app
# over the image's /app/app for live reloads. Delete or rename that file
# (or `docker compose -f docker-compose.yml up` without the override) for a
# production run that uses only the baked-in code.
